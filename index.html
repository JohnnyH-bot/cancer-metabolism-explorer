<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Cancer Metabolism Explorer — Educational Visualization of Tumor Bioenergetics</title><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"><style>
  html, body { margin: 0; padding: 0; background: #0e1116; }
  #root { min-height: 100vh; }
  #boot { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 22px; padding: 20px; text-align: center; }
  #boot .cell { width: 74px; height: 74px; border-radius: 50%; border: 2px solid #2a323d; position: relative; animation: bootpulse 1.6s ease-in-out infinite; }
  #boot .cell::before { content: ""; position: absolute; inset: 14px; border-radius: 50%; border: 1.5px solid #5fc3d6; opacity: .5; animation: bootpulse 1.6s ease-in-out infinite .3s; }
  #boot .cell::after { content: ""; position: absolute; inset: 30px; border-radius: 50%; background: #5fc3d6; opacity: .35; animation: bootpulse 1.6s ease-in-out infinite .6s; }
  #boot .msg { color: #9aa4b0; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 12px; letter-spacing: .1em; line-height: 1.7; max-width: 420px; }
  @keyframes bootpulse { 0%,100% { transform: scale(.9); opacity: .55; } 50% { transform: scale(1.06); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { #boot .cell, #boot .cell::before, #boot .cell::after { animation: none; } }
</style></head>
<body><div id="gate" style="position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(ellipse at top,#141922,#0e1116 60%);padding:24px;text-align:center;font-family:'Inter',system-ui,sans-serif">
  <div style="width:58px;height:58px;border-radius:50%;border:2px solid #2a323d;position:relative">
    <div style="position:absolute;inset:11px;border-radius:50%;border:1.5px solid #5fc3d6;opacity:.5"></div>
    <div style="position:absolute;inset:23px;border-radius:50%;background:#5fc3d6;opacity:.35"></div>
  </div>
  <div style="color:#e6ebf2;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px">Cancer Metabolism Explorer</div>
  <div style="color:#9aa4b0;font-size:13px;line-height:1.6;max-width:360px">This is a private preview shared for feedback. Please enter the password you were given.</div>
  <input id="gate-pw" type="password" autocomplete="off" placeholder="Password" aria-label="Password"
    style="width:230px;max-width:80vw;padding:10px 13px;border-radius:8px;border:1px solid #2a323d;background:#12161c;color:#e6ebf2;font-family:'JetBrains Mono',monospace;font-size:14px;text-align:center;outline:none" />
  <button id="gate-go" style="padding:9px 26px;border-radius:8px;border:1px solid #5fc3d688;background:#5fc3d612;color:#5fc3d6;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:.05em;cursor:pointer">Enter</button>
  <div id="gate-err" style="color:#d97070;font-family:'JetBrains Mono',monospace;font-size:11px;height:14px;letter-spacing:.04em"></div>
</div>
<script>
(function () {
  var HASH = "f0686028e19350e740639010430c5cf8ebab4ae7f4398130eb2adb7b5eadb039"; // sha-256
  var root = document.getElementById("root");
  var gate = document.getElementById("gate");
  var inp = document.getElementById("gate-pw");
  var err = document.getElementById("gate-err");
  if (root) root.style.display = "none";
  function unlock() { try { sessionStorage.setItem("cme_ok", "1"); } catch (e) {} gate.remove(); if (root) root.style.display = ""; }
  async function sha256(t) {
    var b = new TextEncoder().encode(t);
    var d = await crypto.subtle.digest("SHA-256", b);
    return Array.from(new Uint8Array(d)).map(function (x) { return x.toString(16).padStart(2, "0"); }).join("");
  }
  try { if (sessionStorage.getItem("cme_ok") === "1") { unlock(); return; } } catch (e) {}
  async function check() {
    err.textContent = "";
    var h;
    try { h = await sha256(inp.value.trim()); } catch (e) { err.textContent = "This browser blocks the check — try another."; return; }
    if (h === HASH) unlock();
    else { err.textContent = "Incorrect password — check the one from your email."; inp.select(); }
  }
  document.getElementById("gate-go").addEventListener("click", check);
  inp.addEventListener("keydown", function (e) { if (e.key === "Enter") check(); });
  window.addEventListener("load", function () { inp.focus(); });
})();
</script>

const PATH_LABELS = {
  glycolysis: "Glycolysis",
  oxphos: "OXPHOS",
  glutamine: "Glutamine SLP",

// computeState — the core educational model. Given a tumor profile, a set of active conditions
// (dietary state + agents), and a mitochondrial model, it returns modeled activity levels for the
// four ATP-producing pathways plus a redox axis.
//
// IMPORTANT (scientific intent): this represents SIMPLIFIED metabolic relationships described in
// cancer biology literature, for education and visualization only. It is not a validated simulation
// and does not predict how any real tumor or patient will respond. Pathway values are conceptual
// (relative tendencies), not measured percentages. Blocking one pathway here triggers modeled
// compensatory upregulation of others — a real and important phenomenon, but rendered here in a
// deliberately simplified, illustrative form.
function computeState(cancerKeyOrProfile, active, mode) {
  mode = mode || 'respiratory';
  const fermentation = mode === 'fermentation';
  // Accept either a CANCER_PROFILES key (Guided mode) or a direct profile object (Sandbox mode).
  // The engine math below is identical either way — only the source of the baseline differs.
  const profile = typeof cancerKeyOrProfile === 'string' ? CANCER_PROFILES[cancerKeyOrProfile] : cancerKeyOrProfile;

  // ── MODEL-SPECIFIC BASELINES ──────────────────────────────────────────────────────────────
  // The two models do not merely relabel the mitochondrial bar — they disagree about its SIZE.
  // The respiratory reading of (say) glioblastoma gives it LOW oxphos, because its mitochondria are
  // damaged. But the fermentation model's core claim is that mSLP is HIGH precisely where OXPHOS is
  // low: mSLP is what COMPENSATES for the failed respiration and holds the cell's ATP up. Reusing
  // the respiratory number for mSLP therefore understates the very mechanism the model is about.
  // A profile may supply `baselineFermentation` to state what the fermentation model would claim.
  // Where absent, the respiratory baseline is used (previous behaviour).
  const activeBaseline = fermentation && profile.baselineFermentation ? profile.baselineFermentation : profile.baseline;
  let g = activeBaseline.glycolysis;
  let o = activeBaseline.oxphos;
  let q = activeBaseline.glutamine;
  let f = activeBaseline.fatox;
  let redox = 20;
  const mods = {
    glycolysis: [],
    oxphos: [],
    glutamine: [],
    fatox: []
  };
  const ketoActive = active.includes('ketosis');
  const fenActive = active.includes('fenbendazole') || active.includes('mebendazole');
  const iverActive = active.includes('ivermectin');

  // COMPENSATION QUEUE. Compensatory boosts are collected here during the agent pass and applied
  // AFTER it, scaled by how much of each target route actually survives. Applying them inline meant
  // a tumor could "shift load onto glutamine" while glutamine was pharmacologically inhibited to the
  // floor — so adding ketosis to an already-cornered tumor RAISED its glutamine and mitochondrial
  // bars, making a fuel restriction look protective. A blocked route cannot absorb load.
  const pendingComp = [];

  // In the fermentation model, "OXPHOS" is largely glutamine-driven mSLP (fermentation),
  // not true respiration — so the mitochondrial compartment can't stage a genuine
  // oxidative recovery when glucose is cut. Compensation that would flow to oxphos is
  // dampened and redirected to glutamine (the actual fermentative route).
  active.forEach(key => {
    if (key === 'ketosis') {
      g += -55;
      mods.glycolysis.push({
        label: "Ketosis",
        delta: -55,
        note: "glucose scarcity"
      });
      f += 8;
      mods.fatox.push({
        label: "Ketosis",
        delta: 8,
        note: "blood ketone levels rise everywhere; usable capacity is tumor-specific (see cap + note below)"
      });

      // KETONE→CoA DIVERSION (fermentation model only). Seyfried et al. 2020 (iScience, Fig. 4):
      // "The diversion of CoA from succinate to acetoacetate under the metabolism of ketone bodies
      // (β-hydroxybutyrate and acetoacetate) could indirectly reduce ATP synthesis through the SUCL
      // reaction." So ketosis doesn't only starve glucose — it also mildly presses mSLP itself, by
      // competing for the CoA that the succinate-CoA ligase step needs. Modeled as a modest effect
      // (the source hedges with "could indirectly reduce"), and fermentation-only, since it acts on
      // mSLP specifically. It partially offsets the compensatory mSLP rise below.
      if (fermentation) {
        o += -10;
        mods.oxphos.push({
          label: "Ketone → CoA diversion",
          delta: -10,
          note: "fermentation model: ketone-body metabolism diverts CoA from succinate toward acetoacetate (via OXCT1), which Seyfried's group argues could indirectly reduce ATP output at the succinate-CoA ligase (mSLP) step. A proposed, modestly-weighted mechanism — the source hedges it."
        });
      }

      // Channel-biased compensation: the tumor's preferred fallback gets a strong boost,
      // the other viable channels get a smaller "minor" boost — a stressed tumor lights up
      // multiple fallbacks, but not equally.
      //
      // QUEUED, not applied — see pendingComp above and the capacity-scaling pass after the loop.
      const strong = Math.round(26 * profile.plasticity);
      const minor = Math.round(12 * profile.plasticity);
      const ch = profile.compensationChannel;
      if (ch === 'oxphos') {
        if (fermentation) {
          // Seyfried model: no true oxidative recovery. The "preferred fallback" is glutamine
          // fermentation (mSLP), NOT respiration. Send the strong boost to glutamine; the
          // mitochondrial pathway gets only a small residual (it IS glutamine fermentation, tracked
          // mostly by the glutamine pathway), and fat oxidation stays a minor fallback.
          pendingComp.push({
            route: 'q',
            amount: strong,
            label: "Ketosis \u2192 glutaminolysis (preferred compensatory route)",
            note: "fermentation model: glucose restriction alone leaves glutamine fermentation as the surviving fuel — the tumor stays 'alive and growing slowly' (Seyfried)"
          });
          pendingComp.push({
            route: 'o',
            amount: Math.round(minor * 0.5),
            label: "Ketosis \u2192 mSLP (minor, glutamine-fed)",
            note: "damaged mitochondria can't stage real oxidative recovery; this pathway is residual glutamine fermentation, not respiration"
          });
          pendingComp.push({
            route: 'f',
            amount: Math.round(minor * 0.4),
            label: "Fat oxidation (minor compensatory)",
            note: "limited fallback"
          });
        } else {
          pendingComp.push({
            route: 'o',
            amount: strong,
            label: "Ketosis \u2192 OXPHOS (preferred compensatory route)",
            note: "shift to oxidative metabolism, plasticity-scaled"
          });
          pendingComp.push({
            route: 'q',
            amount: minor,
            label: "Glutaminolysis (minor compensatory)",
            note: "secondary fallback under glucose restriction"
          });
          pendingComp.push({
            route: 'f',
            amount: Math.round(minor * 0.5),
            label: "Fat oxidation (minor compensatory)",
            note: "limited fallback"
          });
        }
      } else if (ch === 'glutamine') {
        pendingComp.push({
          route: 'q',
          amount: strong,
          label: "Ketosis \u2192 glutaminolysis (preferred compensatory route)",
          note: "glucose-independent glutamine reliance"
        });
        pendingComp.push({
          route: 'o',
          amount: fermentation ? Math.round(minor * 0.5) : minor,
          label: fermentation ? "mSLP (minor, glutamine-fed)" : "OXPHOS (minor compensatory)",
          note: fermentation ? "residual glutamine fermentation, not respiration" : "secondary fallback"
        });
        pendingComp.push({
          route: 'f',
          amount: Math.round(minor * 0.4),
          label: "Fat oxidation (minor compensatory)",
          note: "limited fallback"
        });
      } else if (ch === 'fatox') {
        pendingComp.push({
          route: 'f',
          amount: strong,
          label: "Ketosis \u2192 fat oxidation (preferred compensatory route)",
          note: "reinforces already-dominant fat oxidation"
        });
        pendingComp.push({
          route: 'q',
          amount: minor,
          label: "Glutaminolysis (minor compensatory)",
          note: "secondary fallback"
        });
        if (!fermentation) {
          pendingComp.push({
            route: 'o',
            amount: Math.round(minor * 0.6),
            label: "OXPHOS (minor compensatory)",
            note: "secondary fallback"
          });
        }
      }
            return;
    }
    if (key === 'berberine' && active.includes('metformin')) {
      const overlap = 0.35;
      let bo = Math.round(AGENTS.berberine.effects.oxphos * overlap);
      // mSLP-sparing in fermentation (see note at the generic oxphos site): ETC inhibition only
      // partially dampens ETC-independent mSLP.
      if (fermentation) bo = Math.round(bo * 0.15);
      o += bo;
      mods.oxphos.push({
        label: "Berberine (overlap-adjusted)",
        delta: bo,
        note: fermentation ? "diminishing returns (same target as metformin); mSLP is ETC-independent so the effect is further reduced in the fermentation model" : "diminishing returns — same target as metformin"
      });

      if (ketoActive || fenActive) {
        const syn = -6;
        g += syn;
        mods.glycolysis.push({
          label: "Berberine × glucose restriction",
          delta: syn,
          note: "secondary agent here — reduced synergy contribution"
        });
      }
      return;
    }
    const a = AGENTS[key];
    if (!a) return;
    if (a.effects.glycolysis) {
      g += a.effects.glycolysis;
      mods.glycolysis.push({
        label: a.label,
        delta: a.effects.glycolysis,
        note: a.note
      });
    }
    if (a.effects.oxphos) {
      // mSLP-sparing (fermentation model): the mitochondrial pathway here is glutamine-fed mSLP —
      // substrate-level phosphorylation at succinyl-CoA ligase, which generates ATP INDEPENDENT of
      // the electron transport chain (Chinopoulos/Seyfried). ETC/complex-I inhibitors (metformin,
      // berberine, ivermectin) block the ETC, so in this model they should only PARTIALLY dampen
      // mSLP (via TCA/NAD+ backup), not abolish it the way they abolish true respiratory OXPHOS.
      // In the respiratory model their full OXPHOS hit stands. Glutamine antagonists still collapse
      // mSLP fully via the coupling below, because they cut its actual fuel.
      const etcInhibitor = key === 'metformin' || key === 'berberine' || key === 'ivermectin';
      const oxEffect = fermentation && etcInhibitor ? Math.round(a.effects.oxphos * 0.15) : a.effects.oxphos;
      o += oxEffect;
      mods.oxphos.push({
        label: a.label,
        delta: oxEffect,
        note: fermentation && etcInhibitor ? "fermentation model: mSLP makes ATP at the succinate-CoA ligase step and needs NO electron transport chain, so an ETC/complex-I inhibitor cannot abolish it. It still dents it — the TCA cycle has to keep turning, and that depends partly on NAD+ regeneration the ETC normally provides — but the effect is small compared with the collapse the same drug causes to true OXPHOS in the respiratory model. This asymmetry is the whole argument for targeting glutamine rather than the ETC." : a.note
      });
    }

      mods.glutamine.push({
        label: a.label,
        delta: a.effects.glutamine,
        note: a.note

      mods.fatox.push({
        label: a.label,
        delta: a.effects.fatox,
        note: a.note
      });

    // own tested drug; for FENBENDAZOLE it's BY ANALOGY (shared chemistry), flagged as such.
    if (key === 'fenbendazole' && fermentation) {
      // Base glutamine effect already applies in both modes (see effects). In the fermentation model,
      // reducing glutaminolysis additionally pressures the mSLP arm that draws on the same supply —
      // a small extra coupling, mirroring mebendazole. By analogy; direct data is mebendazole's.
      q += -6;
      mods.glutamine.push({
        label: "Fenbendazole (mSLP coupling, by analogy)",
        delta: -6,
        note: "fermentation model: benzimidazole glutaminolysis reduction also pressures the mitochondrial mSLP pathway, which draws on the same glutamine supply. Extrapolated from mebendazole, not shown for fenbendazole directly."
      });
    }
    if (key === 'mebendazole' && fermentation) {
      // In Seyfried's model the mSLP/mitochondrial fermentation draws on the glutamine supply, so a
      // benzimidazole that reduces glutaminolysis also pressures the mitochondrial arm here.
      q += -12;
      mods.glutamine.push({
        label: "Mebendazole (glutaminolysis)",
        delta: -12,
        note: "preclinical VM-M3 data show mebendazole reduces glutaminolysis; in the fermentation model this also pressures the mitochondrial mSLP pathway, which draws on the same glutamine supply"
      });
    }
    // ── METFORMIN/BERBERINE × KETOSIS SYNERGY ────────────────────────────────────────────────
    // This is a REAL and specific interaction, but a narrow one. Metformin's best-established
    // clinical action is inhibition of HEPATIC GLUCONEOGENESIS. During fasting or a ketogenic diet,
    // gluconeogenesis is precisely what sustains blood glucose — so metformin deepens the glucose
    // drop that the diet is already producing. Berberine shares the glycemic mechanism, weakly.
    //
    // TWO EARLIER ERRORS, now fixed:
    //  (1) It also fired on fenbendazole/mebendazole. Those block glucose UPTAKE at the tumor cell;
    //      metformin lowers SYSTEMIC glucose via the liver. Different mechanisms — there is no
    //      gluconeogenesis interaction to speak of, so the synergy does not belong there.
    //  (2) The magnitude (-15) was calibrated when metformin was modeled as a potent OXPHOS
    //      inhibitor (oxphos -36) and the rationale was "blocked compensatory escape." After
    //      metformin was correctly downgraded to a modest glycemic agent (Duraj/Seyfried 2024:
    //      direct complex-I cytotoxicity unlikely at achievable doses), that rationale largely
    //      evaporated — but the -15 was left behind, leaving a weak agent with a strong synergy
    //      that hit harder than its own direct effect. Sized down to match what it now is.
    if ((key === 'metformin' || key === 'berberine') && ketoActive) {

      mods.glycolysis.push({
        label: a.label + " × ketosis (gluconeogenesis)",
        delta: syn,
        note: "metformin's best-established action is inhibiting hepatic gluconeogenesis. During fasting or ketosis, gluconeogenesis is what keeps blood glucose up — so blocking it deepens the glucose restriction the diet is already imposing. A modest, additive effect: metformin is not a substitute for the diet, it is an adjunct to it."
      });
    }

    // reported to facilitate DON delivery across the blood–brain barrier, allowing a lower dose to
    // reach therapeutic effect (Mukherjee et al. 2019, Comm Biol). Modeled here as an extra glutamine
    // hit from DON specifically when ketosis is active AND the tumor is a brain cancer. This is a
    // pharmacokinetic (delivery) effect, not a metabolic-pathway effect — flagged as such in the note.
    if (key === 'don' && ketoActive && profile.brainCancer) {
      q += -12;
      mods.glutamine.push({
        label: "DON × ketosis (blood–brain-barrier delivery)",
        delta: -12,
        note: "Brain-tumor specific: a ketogenic state was reported to enhance DON delivery across the blood–brain barrier (Mukherjee et al. 2019), potentially increasing its effective glutamine antagonism at lower doses. This represents drug delivery, not an additional metabolic mechanism."
      });
    }
  });

  // A route can only absorb compensatory load to the extent it is still functional. Capacity is the
  // route's post-agent value as a fraction of its baseline: at full capacity nothing changes (ketosis
  // on an untreated tumor behaves exactly as before), at 10% capacity the tumor recovers only 10% of
  // the modeled boost. This is what stops a fuel restriction from appearing to RESCUE a tumor whose
  // fallback routes have already been inhibited.
  // Capacities are computed ONCE, before any boost is applied, so the queued boosts don't inflate
  // each other's headroom.
  // Capacity must reflect glutamine that is actually AVAILABLE AS FUEL, not gross supply. A large
  // part of a pressed tumor's glutamine is spent rebuilding glutathione under oxidative stress, and
  // glutamine burned as an antioxidant cannot also absorb compensatory ATP load. Projecting that
  // diversion here (it is applied for real further down) is what makes ROS-heavy agent stacks
  // register as genuinely cornered rather than merely inconvenienced.
  const projectedDiversion = clamp(redox, 0, 95) * 0.4 * profile.redoxSensitivity;
  // Glutamine is measured against its baseline NET availability (baseline supply minus the diversion
  // that a resting tumor already pays at redox 20), not gross supply. Otherwise every tumor would
  // start below full capacity purely from resting oxidative maintenance, and ketosis on an untreated
  // tumor would compensate slightly less than the profile's plasticity says it should.
  const restingDiversion = 20 * 0.4 * profile.redoxSensitivity;
  const capacityOf = key => {
    const base = key === 'g' ? activeBaseline.glycolysis : key === 'o' ? activeBaseline.oxphos : key === 'q' ? activeBaseline.glutamine - restingDiversion : activeBaseline.fatox;
    const cur = key === 'g' ? g : key === 'o' ? o : key === 'q' ? q - projectedDiversion : f;
    if (!(base > 0)) return 0;
    return clamp(cur / base, 0, 1);
  };

    g: capacityOf('g'),
    o: capacityOf('o'),
    q: capacityOf('q'),
    f: capacityOf('f')
  };
  // In the fermentation model the mitochondrial bar IS glutamine fermentation, so it cannot absorb
  // compensatory load that glutamine itself cannot supply. Mirrors the mSLP↔glutamine coupling applied
  // later; without it, mSLP could "compensate" on a glutamine supply that has already been spent.
  if (fermentation) caps.o = Math.min(caps.o, caps.q);
  const modsFor = {
    g: mods.glycolysis,
    o: mods.oxphos,
    q: mods.glutamine,
    f: mods.fatox
  };

    const cap = caps[route];
    const scaled = Math.round(amount * cap);
    if (route === 'g') g += scaled;else if (route === 'o') o += scaled;else if (route === 'q') q += scaled;else f += scaled;

      label: label,
      delta: scaled,
      note: cap < 0.95 ? note + " \u2014 REDUCED to " + pct + "% of the modeled boost: this route is itself suppressed to about " + pct + "% of its baseline, and a route that is being blocked cannot absorb much compensatory load. Without this scaling the tool would show a fuel restriction appearing to revive a cornered tumor." : note
    });
  };
  pendingComp.forEach(c => applyComp(c.route, c.amount, c.label, c.note));

  // glutamine. This only makes sense in the RESPIRATORY model, where OXPHOS and glutaminolysis are
  // independent routes. In the fermentation model the mitochondrial ("mSLP") pathway IS glutamine
  // fermentation — the two share one supply — so raising glutamine to "compensate" for lost mSLP
  // would be incoherent (it feeds the very pathway that's being lost). There, the mSLP↔glutamine
  // coupling below handles the relationship instead.
  if (!fermentation && o < 25 && !iverActive) {

    const multiplier = glucoseAlsoRestricted ? 1.5 : 1.0;

  }

  // while glucose is left available, the tumor upregulates glucose fermentation to compensate.
  // This is the mirror of the anaplerotic-pull rule above. Mediated by netGlutamine below, but we
  // gate on the direct glutamine suppression (q) so a glutamine antagonist ALONE lifts glycolysis.
  // Suppressed only when glucose is also restricted (keto/benzimidazole) — then there's no glucose
  // escape to upregulate, which is the whole point of pressing both fuels together.
  const glnSuppressed = q < activeBaseline.glutamine * 0.6;

  }

  // Raised ROS forces the tumor to regenerate glutathione, which is synthesised from glutamine-
  // derived glutamate — so glutamine is consumed as an antioxidant substrate rather than as fuel.
  // This is how a purely redox-acting agent (HBOT, IV vitamin C) moves the glutamine bar without
  // having any direct glutamine effect in its `effects` block.
  // NOTE: this MUST write a mods entry. It previously did not, which meant the "Why is it at N%?"
  // trace reported "nothing applied yet" for HBOT and IVC (whose only action is via redox) and
  // silently under-reported the glutamine drop for every other agent carrying a redox value.
  const gshDiversion = Math.round(redox * 0.4 * profile.redoxSensitivity);
  const baselineDiversion = Math.round(20 * 0.4 * profile.redoxSensitivity); // redox starts at 20

      label: "Glutathione diversion (ROS)",
      delta: -extra,
      note: "raised oxidative stress forces the tumor to rebuild its glutathione buffer, which is synthesised from glutamine-derived glutamate — so glutamine is pulled away from fuelling and spent on antioxidant defence. This is how a redox-acting agent lowers the glutamine bar without touching glutamine directly."
    });
  }

  // In Seyfried's model the mitochondrial ("OXPHOS") pathway is not real respiration — it is
  // glutamine fermented in the mitochondria via mSLP. Therefore it CANNOT stand as an
  // independent fuel route when glutamine is cut: a glutamine antagonist (DON), a glutaminase
  // inhibitor, or fenbendazole-by-analogy must collapse the mSLP pathway along with glutaminolysis,
  // because they draw on the same glutamine supply. This is what makes press-pulse "collapse"
  // the tumor — glucose AND glutamine both gone leaves nowhere to go.
  if (fermentation) {
    const glnBaseline = activeBaseline.glutamine;

function scoreToColor(score) {
  const hue = score / 100 * 120;
  const light = 35 + score / 100 * 25;
  return `hsl(${hue.toFixed(0)}, 82%, ${light.toFixed(0)}%)`;
}
// Alpha-capable + lightness-shiftable variant. scoreToColor returns an hsl() string, so the
// hex-alpha suffix trick (`${color}bb`) is INVALID and silently kills backgrounds/shadows.
// Use this for any translucent fill, gradient stop, or glow.
function scoreToColorA(score, alpha, lightDelta) {
  const hue = score / 100 * 120;
  let light = 35 + score / 100 * 25 + (lightDelta || 0);
  light = Math.max(0, Math.min(100, light));
  return `hsla(${hue.toFixed(0)}, 82%, ${light.toFixed(0)}%, ${alpha})`;
}
function verdictFor(score, path, ctx) {
  if (path === 'glutamine' && ctx.redoxDiversion && score < 45) {
    return "Diverted toward glutathione synthesis — ROS defense over ATP yield.";
  }
  if (path === 'fatox') {
    return score >= 30 ? "Elevated availability, ceiling set by this tumor's ketolytic capacity." : "Present but not a meaningful ATP contributor.";
  }
  if (score >= 65) return "Primary active fuel route.";
  if (score >= 35) return "Partially active — contributes, but not dominant.";
  return "Heavily suppressed in this model.";
}
